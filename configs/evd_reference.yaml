# Reference defaults for enabling EVD in CAT-LVDM or DiT/STDiT pipelines.
evd:
  enable: true
  beta: 12.0
  tau_on: 0.62
  tau_off: 0.38
  t_star: 0.60
  lambda_real: 0.12
  lambda_cons: 0.08
  lambda_order: 0.03
  event_dropout: 0.25
  smooth_kernel: 3
  cfg_scale: 4.0

# CAT-LVDM path:
#   Wrap the 3D U-Net with evd.adapters.CATLVDMEVDAdapter and pass this block
#   as adapter/gating/loss defaults when enable=true.
#
# DiT/STDiT path:
#   Use evd.adapters.STDiTEVDAdapter with final token features [B, N, D],
#   grid_shape=(T, H, W), and latent update fields [B, C, T, H, W].
